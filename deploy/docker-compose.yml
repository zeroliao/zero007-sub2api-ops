x-sub2api-app: &sub2api-app
  image: ghcr.io/zeroliao/sub2api@sha256:3146f8f0236a3fb28efd5dc02642bdd11aa5c5be876e93a4649693c1d48f5435
  restart: unless-stopped
  ulimits:
    nofile:
      soft: 100000
      hard: 100000
  volumes:
    - ./data:/app/data
  environment:
    - AUTO_SETUP=true
    - SERVER_HOST=0.0.0.0
    - SERVER_PORT=8080
    - SERVER_MODE=${SERVER_MODE:-release}
    - RUN_MODE=${RUN_MODE:-standard}
    - DATABASE_HOST=postgres
    - DATABASE_PORT=5432
    - DATABASE_USER=${POSTGRES_USER:-sub2api}
    - DATABASE_PASSWORD=${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
    - DATABASE_DBNAME=${POSTGRES_DB:-sub2api}
    - DATABASE_SSLMODE=disable
    - DATABASE_MAX_OPEN_CONNS=${DATABASE_MAX_OPEN_CONNS:-50}
    - DATABASE_MAX_IDLE_CONNS=${DATABASE_MAX_IDLE_CONNS:-10}
    - DATABASE_CONN_MAX_LIFETIME_MINUTES=${DATABASE_CONN_MAX_LIFETIME_MINUTES:-30}
    - DATABASE_CONN_MAX_IDLE_TIME_MINUTES=${DATABASE_CONN_MAX_IDLE_TIME_MINUTES:-5}
    - REDIS_HOST=redis
    - REDIS_PORT=6379
    - REDIS_PASSWORD=${REDIS_PASSWORD:?REDIS_PASSWORD is required}
    - REDIS_DB=${REDIS_DB:-0}
    - REDIS_POOL_SIZE=${REDIS_POOL_SIZE:-1024}
    - REDIS_MIN_IDLE_CONNS=${REDIS_MIN_IDLE_CONNS:-10}
    - REDIS_ENABLE_TLS=${REDIS_ENABLE_TLS:-false}
    - ADMIN_EMAIL=${ADMIN_EMAIL:-admin@sub2api.local}
    - ADMIN_PASSWORD=${ADMIN_PASSWORD:-}
    - JWT_SECRET=${JWT_SECRET:-}
    - JWT_EXPIRE_HOUR=${JWT_EXPIRE_HOUR:-24}
    - TOTP_ENCRYPTION_KEY=${TOTP_ENCRYPTION_KEY:-}
    - ABUSEIPDB_API_KEY=${ABUSEIPDB_API_KEY:-}
    - TZ=${TZ:-Asia/Shanghai}
    - GEMINI_OAUTH_CLIENT_ID=${GEMINI_OAUTH_CLIENT_ID:-}
    - GEMINI_OAUTH_CLIENT_SECRET=${GEMINI_OAUTH_CLIENT_SECRET:-}
    - GEMINI_OAUTH_SCOPES=${GEMINI_OAUTH_SCOPES:-}
    - GEMINI_QUOTA_POLICY=${GEMINI_QUOTA_POLICY:-}
    - GEMINI_CLI_OAUTH_CLIENT_SECRET=${GEMINI_CLI_OAUTH_CLIENT_SECRET:-}
    - ANTIGRAVITY_OAUTH_CLIENT_SECRET=${ANTIGRAVITY_OAUTH_CLIENT_SECRET:-}
    - ANTIGRAVITY_USER_AGENT_VERSION=${ANTIGRAVITY_USER_AGENT_VERSION:-}
    - SECURITY_URL_ALLOWLIST_ENABLED=${SECURITY_URL_ALLOWLIST_ENABLED:-false}
    - SECURITY_URL_ALLOWLIST_ALLOW_INSECURE_HTTP=${SECURITY_URL_ALLOWLIST_ALLOW_INSECURE_HTTP:-false}
    - SECURITY_URL_ALLOWLIST_ALLOW_PRIVATE_HOSTS=${SECURITY_URL_ALLOWLIST_ALLOW_PRIVATE_HOSTS:-false}
    - SECURITY_URL_ALLOWLIST_UPSTREAM_HOSTS=${SECURITY_URL_ALLOWLIST_UPSTREAM_HOSTS:-api.openai.com,api.anthropic.com,api.kimi.com,open.bigmodel.cn,api.minimaxi.com,generativelanguage.googleapis.com,cloudcode-pa.googleapis.com,oauth2.googleapis.com,www.googleapis.com,*.openai.azure.com}
    - SECURITY_URL_ALLOWLIST_PRICING_HOSTS=${SECURITY_URL_ALLOWLIST_PRICING_HOSTS:-raw.githubusercontent.com}
    - SECURITY_URL_ALLOWLIST_CRS_HOSTS=${SECURITY_URL_ALLOWLIST_CRS_HOSTS:-}
    - UPDATE_PROXY_URL=${UPDATE_PROXY_URL:-}
    - GATEWAY_IMAGE_STREAM_DATA_INTERVAL_TIMEOUT=${GATEWAY_IMAGE_STREAM_DATA_INTERVAL_TIMEOUT:-900}
    - GATEWAY_IMAGE_STREAM_KEEPALIVE_INTERVAL=${GATEWAY_IMAGE_STREAM_KEEPALIVE_INTERVAL:-10}
    - GATEWAY_IMAGE_CONCURRENCY_ENABLED=${GATEWAY_IMAGE_CONCURRENCY_ENABLED:-false}
    - GATEWAY_IMAGE_CONCURRENCY_MAX_CONCURRENT_REQUESTS=${GATEWAY_IMAGE_CONCURRENCY_MAX_CONCURRENT_REQUESTS:-0}
    - GATEWAY_IMAGE_CONCURRENCY_OVERFLOW_MODE=${GATEWAY_IMAGE_CONCURRENCY_OVERFLOW_MODE:-reject}
    - GATEWAY_IMAGE_CONCURRENCY_WAIT_TIMEOUT_SECONDS=${GATEWAY_IMAGE_CONCURRENCY_WAIT_TIMEOUT_SECONDS:-30}
    - GATEWAY_IMAGE_CONCURRENCY_MAX_WAITING_REQUESTS=${GATEWAY_IMAGE_CONCURRENCY_MAX_WAITING_REQUESTS:-100}
  depends_on:
    postgres:
      condition: service_healthy
    redis:
      condition: service_healthy
  networks:
    - sub2api-network
  healthcheck:
    test: ["CMD", "wget", "-q", "-T", "5", "-O", "/dev/null", "http://localhost:8080/health"]
    interval: 30s
    timeout: 10s
    retries: 3
    start_period: 30s

services:
  sing-box:
    image: ghcr.io/sagernet/sing-box@sha256:da0e2331395c9025a85fa58892772b4cdbe5f2e530e93defeec3968175d06c6d
    container_name: sing-box
    restart: unless-stopped
    volumes:
      - ./sing-box/config.json:/etc/sing-box/config.json:ro
    command: ["run", "-c", "/etc/sing-box/config.json"]
    networks:
      - sub2api-network

  clash-node:
    image: ghcr.io/sagernet/sing-box@sha256:da0e2331395c9025a85fa58892772b4cdbe5f2e530e93defeec3968175d06c6d
    container_name: sub2api-clash-node
    restart: unless-stopped
    entrypoint: ["/bin/sh"]
    command:
      - -ec
      - |
        : "$${CLASH_NODE_PASSWORD:?CLASH_NODE_PASSWORD is required}"
        cat > /tmp/sing-box-clash-node.json <<EOF
        {
          "log": {
            "level": "$${CLASH_NODE_LOG_LEVEL:-warn}",
            "timestamp": true
          },
          "inbounds": [
            {
              "type": "shadowsocks",
              "tag": "clash-verge-ss",
              "listen": "0.0.0.0",
              "listen_port": $${CLASH_NODE_PORT:-8388},
              "method": "$${CLASH_NODE_METHOD:-aes-256-gcm}",
              "password": "$${CLASH_NODE_PASSWORD}"
            }
          ],
          "outbounds": [
            {
              "type": "direct",
              "tag": "direct"
            }
          ],
          "route": {
            "final": "direct"
          }
        }
        EOF
        exec /usr/local/bin/sing-box run -c /tmp/sing-box-clash-node.json
    environment:
      - TZ=${TZ:-Asia/Shanghai}
      - CLASH_NODE_PORT=${CLASH_NODE_PORT:-8388}
      - CLASH_NODE_METHOD=${CLASH_NODE_METHOD:-aes-256-gcm}
      - CLASH_NODE_PASSWORD=${CLASH_NODE_PASSWORD:?CLASH_NODE_PASSWORD is required}
      - CLASH_NODE_LOG_LEVEL=${CLASH_NODE_LOG_LEVEL:-warn}
    ports:
      - "${CLASH_NODE_BIND_HOST:-0.0.0.0}:${CLASH_NODE_PORT:-8388}:${CLASH_NODE_PORT:-8388}/tcp"
      - "${CLASH_NODE_BIND_HOST:-0.0.0.0}:${CLASH_NODE_PORT:-8388}:${CLASH_NODE_PORT:-8388}/udp"
    networks:
      - sub2api-network
    healthcheck:
      test: ["CMD-SHELL", "test -f /tmp/sing-box-clash-node.json && /usr/local/bin/sing-box check -c /tmp/sing-box-clash-node.json >/dev/null 2>&1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  vpn-ws-node:
    image: ghcr.io/sagernet/sing-box@sha256:da0e2331395c9025a85fa58892772b4cdbe5f2e530e93defeec3968175d06c6d
    container_name: sub2api-vpn-ws-node
    restart: unless-stopped
    entrypoint: ["/bin/sh"]
    command:
      - -ec
      - |
        : "$${VPN_WS_UUID:?VPN_WS_UUID is required}"
        : "$${VPN_WS_TROJAN_PASSWORD:?VPN_WS_TROJAN_PASSWORD is required}"
        cat > /tmp/sing-box-vpn-ws-node.json <<EOF
        {
          "log": {
            "level": "$${VPN_WS_LOG_LEVEL:-warn}",
            "timestamp": true
          },
          "inbounds": [
            {
              "type": "vless",
              "tag": "vless-ws",
              "listen": "0.0.0.0",
              "listen_port": 18080,
              "users": [
                {
                  "uuid": "$${VPN_WS_UUID}"
                }
              ],
              "transport": {
                "type": "ws",
                "path": "$${VPN_WS_VLESS_PATH:-/vless}"
              }
            },
            {
              "type": "trojan",
              "tag": "trojan-ws",
              "listen": "0.0.0.0",
              "listen_port": 18081,
              "users": [
                {
                  "password": "$${VPN_WS_TROJAN_PASSWORD}"
                }
              ],
              "transport": {
                "type": "ws",
                "path": "$${VPN_WS_TROJAN_PATH:-/trojan}"
              }
            }
          ],
          "outbounds": [
            {
              "type": "direct",
              "tag": "direct"
            }
          ],
          "route": {
            "final": "direct"
          }
        }
        EOF
        exec /usr/local/bin/sing-box run -c /tmp/sing-box-vpn-ws-node.json
    environment:
      - TZ=${TZ:-Asia/Shanghai}
      - VPN_WS_UUID=${VPN_WS_UUID:?VPN_WS_UUID is required}
      - VPN_WS_TROJAN_PASSWORD=${VPN_WS_TROJAN_PASSWORD:?VPN_WS_TROJAN_PASSWORD is required}
      - VPN_WS_VLESS_PATH=${VPN_WS_VLESS_PATH:-/vless}
      - VPN_WS_TROJAN_PATH=${VPN_WS_TROJAN_PATH:-/trojan}
      - VPN_WS_LOG_LEVEL=${VPN_WS_LOG_LEVEL:-warn}
    networks:
      - sub2api-network
    healthcheck:
      test: ["CMD-SHELL", "test -f /tmp/sing-box-vpn-ws-node.json && /usr/local/bin/sing-box check -c /tmp/sing-box-vpn-ws-node.json >/dev/null 2>&1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  caddy:
    image: caddy:2-alpine@sha256:3739ea4f0c877259a693d932693cf8f3408e9a9497c004f031b0e830e93e1546
    container_name: sub2api-caddy
    restart: unless-stopped
    ports:
      - "${BIND_HOST:-127.0.0.1}:${SERVER_PORT:-8080}:8080"
    volumes:
      - ./caddy/Caddyfile:/etc/caddy/Caddyfile:ro
      - ./caddy/subscriptions:/srv/clash-subscriptions:ro
      - ./caddy_data:/data
      - ./caddy_config:/config
    networks:
      - sub2api-network
    healthcheck:
      test: ["CMD", "wget", "-q", "-T", "5", "-O", "/dev/null", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  sub2api-blue:
    <<: *sub2api-app
    container_name: sub2api-blue

  sub2api-green:
    <<: *sub2api-app
    container_name: sub2api-green
    profiles:
      - bluegreen

  postgres:
    image: postgres:18-alpine@sha256:48c8ad3a7284b82be4482a52076d47d879fd6fb084a1cbfccbd551f9331b0e40
    container_name: sub2api-postgres
    restart: unless-stopped
    ulimits:
      nofile:
        soft: 100000
        hard: 100000
    volumes:
      - ./postgres_data:/var/lib/postgresql/data
    environment:
      - POSTGRES_USER=${POSTGRES_USER:-sub2api}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
      - POSTGRES_DB=${POSTGRES_DB:-sub2api}
      - PGDATA=/var/lib/postgresql/data
      - TZ=${TZ:-Asia/Shanghai}
    networks:
      - sub2api-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-sub2api} -d ${POSTGRES_DB:-sub2api}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  redis:
    image: redis:8-alpine@sha256:81b6f81d6a6c5b9019231a2e8eb10085e3a139a34f833dcc965a8a959b040b72
    container_name: sub2api-redis
    restart: unless-stopped
    ulimits:
      nofile:
        soft: 100000
        hard: 100000
    volumes:
      - ./redis_data:/data
    command: >
        sh -c '
          redis-server
          --save 60 1
          --appendonly yes
          --appendfsync everysec
          --requirepass "$$REDIS_PASSWORD"'
    environment:
      - TZ=${TZ:-Asia/Shanghai}
      - REDISCLI_AUTH=${REDIS_PASSWORD:?REDIS_PASSWORD is required}
    networks:
      - sub2api-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 5s

networks:
  sub2api-network:
    driver: bridge
